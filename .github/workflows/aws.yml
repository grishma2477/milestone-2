name: Build and Push to Public ECR

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2

      - name: Login to Public ECR
        run: |
          aws ecr-public get-login-password --region ap-southeast-2 | \
          docker login --username AWS --password-stdin public.ecr.aws/e7q7v9l8

      - name: Build Docker image
        run: |
          docker build -t ${{ vars.ECR_REPOSITORY }} .

      - name: Tag Docker image
        run: |
          docker tag ${{ vars.ECR_REPOSITORY }}:latest public.ecr.aws/e7q7v9l8/${{ vars.ECR_REPOSITORY }}:latest
          docker tag ${{ vars.ECR_REPOSITORY }}:latest public.ecr.aws/e7q7v9l8/${{ vars.ECR_REPOSITORY }}:${{ github.sha }}

      - name: Push Docker image
        run: |
          docker push public.ecr.aws/e7q7v9l8/${{ vars.ECR_REPOSITORY }}:latest
          docker push public.ecr.aws/e7q7v9l8/${{ vars.ECR_REPOSITORY }}:${{ github.sha }}
