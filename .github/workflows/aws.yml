name: Build and Push to Public ECR

on:
  push:
    branches:
      - master

# env:
#   AWS_REGION: us-east-1
#   ECR_REPOSITORY: mile2

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Public ECR
        run: |
          aws ecr-public get-login-password --region ${{ secrets.AWS_REGION }} | \
          docker login --username AWS --password-stdin public.ecr.aws/e7q7v9l8

      - name: Build and Push
        run: |
          docker build -t mile2 .
          docker tag mile2:latest public.ecr.aws/e7q7v9l8/mile2:${{ github.sha }}
          docker tag mile2:latest public.ecr.aws/e7q7v9l8/mile2:latest
          docker push public.ecr.aws/e7q7v9l8/mile2:${{ github.sha }}
          docker push public.ecr.aws/e7q7v9l8/mile2:latest
